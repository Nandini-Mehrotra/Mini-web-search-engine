<!DOCTYPE html>
<html>
<head>
    <title>Admin - Mini Search Engine</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="container">
        <h1>Admin Panel</h1>

        <form method="POST">
            <input 
                type="url" 
                name="url" 
                placeholder="Enter website URL to crawl"
                required
            >
            <button type="submit">Crawl URL</button>
        </form>

        {% if message %}
            <p class="success-message">{{ message }}</p>
        {% endif %}

        <br>
        <a href="/">Back to Search</a>
    </div>

</body>
</html>
